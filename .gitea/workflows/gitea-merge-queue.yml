name: Merge Queue

on:
  pull_request:
    types: [labeled]

jobs:
  merge:
    if: contains(github.event.pull_request.labels.*.name, 'merge-queue')
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/merge" \
            -d '{"do":"merge","merge_when_checks_succeed":true}'
